---
deployment:
  tasks:
    - /bin/sh -c 'SRC=/home/eagleerq/repos/GebrielSenbetWeb; DEST=/home/eagleerq/gebriel.eagleeyebgp.com; DEST2=/home/eagleerq/home/eagleerq/gebriel.eagleeyebgp.com; LOG=/home/eagleerq/cpanel-deploy.log; EXCLUDES="--exclude=.git --exclude=.github --exclude=.cpanel.yml --exclude=.DS_Store --exclude=node_modules --exclude=.well-known --exclude=.user.ini --exclude=.ftpquota"; { echo "=== Deploy started at $(/bin/date) ==="; echo "whoami=$(/usr/bin/whoami 2>/dev/null || /bin/whoami 2>/dev/null)"; echo "HOME=$HOME"; echo "pwd=$(pwd)"; RSYNC=""; for p in /bin/rsync /usr/bin/rsync /usr/local/bin/rsync /opt/cpanel/3rdparty/bin/rsync /usr/local/cpanel/3rdparty/bin/rsync; do [ -x "$p" ] && RSYNC="$p" && break; done; [ -z "$RSYNC" ] && RSYNC=$(command -v rsync 2>/dev/null); if [ -n "$RSYNC" ]; then echo "Using rsync at $RSYNC"; "$RSYNC" -av --delete $EXCLUDES "$SRC/" "$DEST/"; else echo "rsync not available; falling back to tar pipe (no --delete)"; mkdir -p "$DEST"; (cd "$SRC" && tar $EXCLUDES -cf - .) | (cd "$DEST" && tar -xf -) && echo "tar copy complete"; fi; chmod 755 "$DEST" && echo "chmod 755 $DEST ok"; STAMP=$(/bin/date +%s); echo "Marker stamp=$STAMP"; mkdir -p "$DEST/public" && echo "MARKER_SINGLE stamp=$STAMP path=$DEST/public" > "$DEST/public/MARKER.txt" && echo "wrote $DEST/public/MARKER.txt"; if [ -d "$HOME/home" ]; then echo "--- $HOME/home exists; listing ---"; ls -laR "$HOME/home" 2>&1 | head -80; mkdir -p "$DEST2/public" && echo "MARKER_DOUBLE stamp=$STAMP path=$DEST2/public" > "$DEST2/public/MARKER.txt" && chmod 755 "$DEST2" "$HOME/home" "$HOME/home/eagleerq" 2>/dev/null && echo "wrote $DEST2/public/MARKER.txt"; else echo "$HOME/home does NOT exist"; fi; echo "--- Listing $DEST ---"; ls -la "$DEST" 2>&1 | head -40; echo "--- Listing $DEST/public ---"; ls -la "$DEST/public" 2>&1 | head -40; echo "=== Deploy finished at $(/bin/date) ==="; } > "$LOG" 2>&1'
